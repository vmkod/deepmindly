database:
  # Путь указывается относительно расположения этого config.yaml
  path: "data/deepmindly.db"

watcher:
  # Частота проверки активного окна, в секундах
  interval_seconds: 3

ai:
  # Модель для построения эмбеддингов заголовков
  model_name: "all-MiniLM-L6-v2"
  # Количество тематических кластеров активностей для K-Means
  n_clusters: 3
  # Сколько заголовков выводить на кластер
  top_n_titles: 3